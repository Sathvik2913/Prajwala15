# Default configuration. Override on the CLI where supported.

paths:
  data_root: data
  ann:
    train: data/TextVQA_0.5.1_train.json
    val:   data/TextVQA_0.5.1_val.json
    test:  data/TextVQA_0.5.1_test.json
  images:
    train: data/train_images/train_images
    val:   data/train_images/train_images
    test:  data/test_images
  ocr_cache: outputs/ocr_cache
  preds:     outputs/preds
  scores:    outputs/scores

ocr:
  engine: easyocr           # easyocr | tesseract | paddleocr
  langs: [en]
  max_tokens: 50
  min_confidence: 0.30
  preprocess: false         # set true or use --preprocess in 01_run_ocr.py
  preprocess_opts:
    denoise: true
    enhance: true
    deskew: true

ocr_first:
  backend: text_qa          # text_qa | blip2_text | api
  text_model: google/flan-t5-base
  api_model: claude-sonnet-4-6
  max_new_tokens: 16

vlm:
  backend: blip2
  blip2_model: Salesforce/blip2-flan-t5-xl
  api_model: claude-sonnet-4-6
  max_new_tokens: 16

eval:
  limit: 0
  batch_size: 8
  device: auto
